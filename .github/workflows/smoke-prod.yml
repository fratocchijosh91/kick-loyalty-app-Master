name: Smoke Test Production API

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke test
        env:
          SMOKE_API_URL: ${{ secrets.SMOKE_API_URL }}
          SMOKE_USERNAME: smoke_ci_user
        run: npm run smoke
