name: Smoke Test Production API

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke test
        env:
          SMOKE_API_URL: ${{ secrets.SMOKE_API_URL }}
          SMOKE_USERNAME: smoke_ci_user
        run: npm run smoke

      - name: Run release checks
        env:
          SMOKE_API_URL: ${{ secrets.SMOKE_API_URL }}
        run: npm run release:check

      - name: Notify webhook on failure
        if: failure() && secrets.SMOKE_ALERT_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.SMOKE_ALERT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Smoke workflow failed on ${GITHUB_REPOSITORY}. Run: ${RUN_URL}\"}"

      - name: Create or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Smoke/Release check failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Automated smoke or release checks failed.\n\nRun: ${runUrl}\nCommit: ${context.sha}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'smoke-failure',
              per_page: 20
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['smoke-failure']
              });
            }
