<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - KickLoyalty</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: #53FC18;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
      animation: pulse 2s ease infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    p {
      color: rgba(242, 242, 242, 0.6);
      font-size: 16px;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }
    
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #53FC18;
      color: #0a0a0a;
    }
    
    .btn-primary:hover {
      background: #4de016;
    }
    
    .btn-secondary {
      background: transparent;
      color: #f2f2f2;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .cached-data {
      margin-top: 32px;
      padding: 16px;
      background: rgba(83, 252, 24, 0.1);
      border: 1px solid rgba(83, 252, 24, 0.2);
      border-radius: 12px;
      max-width: 300px;
    }
    
    .cached-data h3 {
      font-size: 14px;
      color: #53FC18;
      margin-bottom: 8px;
    }
    
    .cached-data ul {
      list-style: none;
      font-size: 13px;
      color: rgba(242, 242, 242, 0.6);
    }
    
    .cached-data li {
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="logo">🎮</div>
  
  <div class="icon">📡</div>
  
  <h1>Sei Offline</h1>
  
  <p>
    Non sei connesso a Internet. Alcune funzionalità potrebbero non essere disponibili.
  </p>
  
  <div class="actions">
    <button class="btn-primary" onclick="window.location.reload()">
      🔄 Riprova
    </button>
    <button class="btn-secondary" onclick="goToDashboard()">
      📱 Vai alla Dashboard (Offline)
    </button>
  </div>
  
  <div class="cached-data" id="cachedInfo">
    <h3>📦 Dati in Cache</h3>
    <ul>
      <li>Punti salvati</li>
      <li>Rewards disponibili</li>
      <li>Storico riscatti</li>
    </ul>
  </div>
  
  <script>
    function goToDashboard() {
      window.location.href = '/dashboard';
    }
    
    // Check if we have cached data
    if ('caches' in window) {
      caches.keys().then(cacheNames => {
        const hasCache = cacheNames.some(name => 
          name.includes('kickloyalty')
        );
        
        if (!hasCache) {
          document.getElementById('cachedInfo').style.display = 'none';
        }
      });
    }
    
    // Listen for online/offline events
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
